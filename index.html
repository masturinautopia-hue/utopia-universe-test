<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utopia Universe | Business Directory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="starlight-page">
        <canvas id="starfield"></canvas>

        <div class="hero-overlay">
            <div class="hero-copy">
                <div class="hero-logo">
                    <img src="assets/logos/utopia-goc.png" alt="Utopia Group of Companies logo">
                </div>
                <span class="eyebrow">Business Directory</span>
                <h1>Welcome to Utopia Universe</h1>
                <p class="hero-text">Discover trusted company profiles, services, and contact details in one place.</p>
                <a class="hero-button" href="directory.html">View the directory</a>
            </div>
        </div>
    </div>

    <script>
        const starfield = document.getElementById('starfield');
        const starCtx = starfield.getContext('2d');
        let stars = [];
        const STAR_COUNT = 180;

        function resizeStarfield() {
            starfield.width = window.innerWidth;
            starfield.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * starfield.width;
                this.y = (Math.random() - 0.5) * starfield.height;
                this.z = Math.random() * starfield.width;
                this.radius = Math.random() * 1.2 + 0.2;
                this.speed = 0.25 + Math.random() * 1.5;
            }

            update() {
                this.z -= this.speed;
                if (this.z <= 0) {
                    this.reset();
                    this.z = starfield.width;
                }
            }

            draw() {
                const perspective = starfield.width / this.z;
                const x = this.x * perspective + starfield.width / 2;
                const y = this.y * perspective + starfield.height / 2;
                const radius = this.radius * perspective;
                const alpha = Math.max(0, 1 - this.z / starfield.width);

                starCtx.beginPath();
                starCtx.fillStyle = `rgba(255,255,255,${alpha})`;
                starCtx.arc(x, y, radius, 0, Math.PI * 2);
                starCtx.fill();
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push(new Star());
            }
        }

        function animateStarfield() {
            starCtx.fillStyle = 'rgba(4, 12, 28, 0.55)';
            starCtx.fillRect(0, 0, starfield.width, starfield.height);
            stars.forEach((star) => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animateStarfield);
        }

        window.addEventListener('resize', () => {
            resizeStarfield();
            createStars();
        });

        resizeStarfield();
        createStars();
        animateStarfield();
    </script>
</body>
</html>
